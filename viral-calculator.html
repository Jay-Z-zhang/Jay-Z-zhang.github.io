<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>裂变活动效果计算器 v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #0b0f1a; --surface: #131928; --border: #1e293b;
      --green: #22c55e; --green-dim: rgba(34,197,94,0.1);
      --yellow: #fbbf24; --red: #f87171; --muted: #64748b; --text: #f1f5f9;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system,"PingFang SC",sans-serif; }

    /* ── Tabs ── */
    .tab-btn { padding:8px 20px; border-radius:8px; font-size:14px; font-weight:500; color:var(--muted); border:1px solid transparent; transition:all .2s; cursor:pointer; }
    .tab-btn.active { background:var(--green-dim); color:var(--green); border-color:rgba(34,197,94,.3); }
    .tab-btn:hover:not(.active) { color:var(--text); }

    /* ── Inputs ── */
    input[type=range] { -webkit-appearance:none; width:100%; height:4px; background:var(--border); border-radius:2px; outline:none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:var(--green); cursor:pointer; box-shadow:0 0 6px rgba(34,197,94,.5); }
    input[type=range]::-webkit-slider-runnable-track { height:4px; border-radius:2px; background:linear-gradient(to right,var(--green) var(--p,0%),var(--border) var(--p,0%)); }
    .num-in { background:var(--border); border:1px solid var(--border); color:var(--text); border-radius:6px; padding:4px 8px; width:80px; font-size:13px; text-align:right; outline:none; transition:border-color .2s; }
    .num-in:focus { border-color:var(--green); }
    .num-in::-webkit-inner-spin-button { opacity:.4; }

    /* ── Funnel ── */
    .funnel-row { position:relative; display:flex; align-items:center; margin-bottom:2px; }
    .funnel-bar { height:36px; border-radius:4px; transition:width .4s cubic-bezier(.4,0,.2,1); display:flex; align-items:center; padding:0 10px; font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; min-width:40px; }
    .funnel-label { font-size:12px; color:var(--muted); width:120px; flex-shrink:0; line-height:1.3; }
    .funnel-val { font-size:12px; font-weight:600; margin-left:8px; color:var(--text); white-space:nowrap; }
    .funnel-rate { font-size:11px; color:var(--muted); margin-left:6px; }
    .funnel-arrow { font-size:10px; color:var(--muted); margin:1px 0 1px 124px; }

    /* ── Metric cards ── */
    .mcard { background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:16px; transition:border-color .2s; }
    .mcard:hover { border-color:rgba(34,197,94,.25); }

    /* ── Comparison table ── */
    .cmp-better { color:#4ade80; font-weight:700; }
    .cmp-worse  { color:#f87171; }
    .cmp-same   { color:var(--muted); }

    /* ── Prediction bars ── */
    .pred-bar-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
    .pred-bar-outer { width:100%; background:var(--border); border-radius:4px; overflow:hidden; height:120px; display:flex; align-items:flex-end; }
    .pred-bar-fill { width:100%; border-radius:4px 4px 0 0; transition:height .4s ease; background:linear-gradient(180deg,#4ade80,#22c55e); }

    /* ── Verdict badges ── */
    .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 10px; border-radius:20px; font-size:12px; font-weight:600; }
    .badge-g { background:rgba(34,197,94,.12); color:#4ade80; }
    .badge-y { background:rgba(251,191,36,.12); color:#fbbf24; }
    .badge-r { background:rgba(239,68,68,.12); color:#f87171; }

    /* ── Tooltip ── */
    .tip-wrap { position:relative; display:inline-flex; cursor:help; }
    .tip-wrap .tip { visibility:hidden; opacity:0; background:#1e293b; color:#94a3b8; font-size:12px; line-height:1.5; border:1px solid #334155; border-radius:8px; padding:8px 12px; position:absolute; bottom:130%; left:50%; transform:translateX(-50%); width:220px; z-index:20; transition:opacity .2s; pointer-events:none; white-space:normal; }
    .tip-wrap:hover .tip { visibility:visible; opacity:1; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fu { animation:fadeUp .35s ease both; }
  </style>
</head>
<body class="min-h-screen">

<div class="max-w-6xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="mb-6 fu">
    <h1 class="text-2xl font-bold flex items-center gap-2">⚡ 裂变活动效果计算器</h1>
    <p class="text-sm mt-1" style="color:var(--muted)">App S&R 活动完整漏斗 · 与广告投放效率对比 · 实时 Dashboard</p>
  </div>

  <!-- Tabs -->
  <div class="flex gap-2 mb-6 fu" style="animation-delay:.05s">
    <button class="tab-btn active" onclick="switchTab('viral',this)">🔁 裂变漏斗</button>
    <button class="tab-btn" onclick="switchTab('ads',this)">📢 广告投放</button>
    <button class="tab-btn" onclick="switchTab('compare',this)">⚖️ 对比视图</button>
  </div>

  <!-- ══════════ TAB: 裂变漏斗 ══════════ -->
  <div id="tab-viral" class="grid md:grid-cols-2 gap-5 fu" style="animation-delay:.08s">

    <!-- Left: params -->
    <div class="space-y-3">
      <div class="rounded-2xl p-5 space-y-4" style="background:var(--surface);border:1px solid var(--border)">
        <h3 class="text-xs font-semibold uppercase tracking-widest" style="color:var(--muted)">📊 漏斗参数</h3>

        <!-- DAU -->
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm flex items-center gap-1">App DAU
              <span class="tip-wrap"><span style="color:var(--muted);font-size:11px">?</span><span class="tip">活动期间日活跃用户数</span></span>
            </label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="dau" value="50000" min="1000" max="10000000" step="1000" oninput="calc()"><span class="text-xs" style="color:var(--muted)">人</span></div>
          </div>
          <input type="range" id="dau_r" min="1000" max="500000" step="1000" value="50000" oninput="sv('dau','dau_r');calc()">
        </div>

        <!-- 活动UV率 -->
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm flex items-center gap-1">活动 UV 率
              <span class="tip-wrap"><span style="color:var(--muted);font-size:11px">?</span><span class="tip">DAU 中看到活动入口的比例</span></span>
            </label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="actUvRate" value="30" min="0" max="100" step="1" oninput="calc()"><span class="text-xs" style="color:var(--muted)">%</span></div>
          </div>
          <input type="range" id="actUvRate_r" min="0" max="100" step="1" value="30" oninput="sv('actUvRate','actUvRate_r');calc()">
        </div>

        <!-- 点击分享UV率 -->
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm flex items-center gap-1">点击分享 UV 率
              <span class="tip-wrap"><span style="color:var(--muted);font-size:11px">?</span><span class="tip">活动UV中点击分享按钮的比例</span></span>
            </label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="shareClickRate" value="10" min="0" max="100" step="0.5" oninput="calc()"><span class="text-xs" style="color:var(--muted)">%</span></div>
          </div>
          <input type="range" id="shareClickRate_r" min="0" max="100" step="0.5" value="10" oninput="sv('shareClickRate','shareClickRate_r');calc()">
        </div>

        <!-- 客态页曝光UV（人均传播人数） -->
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm flex items-center gap-1">人均传播新用户数
              <span class="tip-wrap"><span style="color:var(--muted);font-size:11px">?</span><span class="tip">每个分享者平均触达几个潜在新用户（客态页曝光UV / 分享UV）</span></span>
            </label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="spreadCount" value="3" min="1" max="50" step="0.5" oninput="calc()"><span class="text-xs" style="color:var(--muted)">人</span></div>
          </div>
          <input type="range" id="spreadCount_r" min="1" max="20" step="0.5" value="3" oninput="sv('spreadCount','spreadCount_r');calc()">
        </div>

        <!-- 客态页点击助力率 -->
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm flex items-center gap-1">客态页点击助力率
              <span class="tip-wrap"><span style="color:var(--muted);font-size:11px">?</span><span class="tip">看到客态页的用户中点击助力的比例</span></span>
            </label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="helpClickRate" value="25" min="0" max="100" step="1" oninput="calc()"><span class="text-xs" style="color:var(--muted)">%</span></div>
          </div>
          <input type="range" id="helpClickRate_r" min="0" max="100" step="1" value="25" oninput="sv('helpClickRate','helpClickRate_r');calc()">
        </div>

        <!-- 助力新客率 -->
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm flex items-center gap-1">助力新客率
              <span class="tip-wrap"><span style="color:var(--muted);font-size:11px">?</span><span class="tip">点击助力中属于新客（历史未购买）的比例</span></span>
            </label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="newUserRate" value="70" min="0" max="100" step="1" oninput="calc()"><span class="text-xs" style="color:var(--muted)">%</span></div>
          </div>
          <input type="range" id="newUserRate_r" min="0" max="100" step="1" value="70" oninput="sv('newUserRate','newUserRate_r');calc()">
        </div>

        <!-- 助力新客转化率 -->
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm flex items-center gap-1">助力新客转化率
              <span class="tip-wrap"><span style="color:var(--muted);font-size:11px">?</span><span class="tip">助力新客中完成首单的比例</span></span>
            </label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="newConvRate" value="20" min="0" max="100" step="1" oninput="calc()"><span class="text-xs" style="color:var(--muted)">%</span></div>
          </div>
          <input type="range" id="newConvRate_r" min="0" max="100" step="1" value="20" oninput="sv('newConvRate','newConvRate_r');calc()">
        </div>
      </div>

      <div class="rounded-2xl p-5 space-y-4" style="background:var(--surface);border:1px solid var(--border)">
        <h3 class="text-xs font-semibold uppercase tracking-widest" style="color:var(--muted)">💵 成本 &amp; 收益</h3>
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm">每新客奖励成本</label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="rewardCost" value="8" min="0" max="500" step="0.5" oninput="calc()"><span class="text-xs" style="color:var(--muted)">元</span></div>
          </div>
          <input type="range" id="rewardCost_r" min="0" max="100" step="0.5" value="8" oninput="sv('rewardCost','rewardCost_r');calc()">
        </div>
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm">活动总预算</label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="budget" value="50000" min="0" max="5000000" step="1000" oninput="calc()"><span class="text-xs" style="color:var(--muted)">元</span></div>
          </div>
          <input type="range" id="budget_r" min="0" max="500000" step="1000" value="50000" oninput="sv('budget','budget_r');calc()">
        </div>
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm">首单 GMV</label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="gmv" value="120" min="0" max="5000" step="5" oninput="calc()"><span class="text-xs" style="color:var(--muted)">元</span></div>
          </div>
          <input type="range" id="gmv_r" min="0" max="1000" step="5" value="120" oninput="sv('gmv','gmv_r');calc()">
        </div>
        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm">毛利率</label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="margin" value="25" min="0" max="100" step="1" oninput="calc()"><span class="text-xs" style="color:var(--muted)">%</span></div>
          </div>
          <input type="range" id="margin_r" min="0" max="100" step="1" value="25" oninput="sv('margin','margin_r');calc()">
        </div>
      </div>
    </div>

    <!-- Right: funnel viz + cards -->
    <div class="space-y-4">
      <div class="rounded-2xl p-5" style="background:var(--surface);border:1px solid var(--border)">
        <h3 class="text-xs font-semibold uppercase tracking-widest mb-4" style="color:var(--muted)">漏斗可视化</h3>
        <div id="viralFunnel" class="space-y-0"></div>
      </div>
      <div class="grid grid-cols-2 gap-3" id="viralCards"></div>
    </div>
  </div>

  <!-- ══════════ TAB: 广告投放 ══════════ -->
  <div id="tab-ads" class="grid md:grid-cols-2 gap-5 hidden fu" style="animation-delay:.08s">
    <div class="space-y-3">
      <div class="rounded-2xl p-5 space-y-4" style="background:var(--surface);border:1px solid var(--border)">
        <h3 class="text-xs font-semibold uppercase tracking-widest" style="color:var(--muted)">📢 广告漏斗参数</h3>

        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm flex items-center gap-1">广告曝光 UV
              <span class="tip-wrap"><span style="color:var(--muted);font-size:11px">?</span><span class="tip">广告的总曝光量（Impression UV）</span></span>
            </label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="adImp" value="200000" min="0" max="100000000" step="10000" oninput="calc()"><span class="text-xs" style="color:var(--muted)">UV</span></div>
          </div>
          <input type="range" id="adImp_r" min="0" max="2000000" step="10000" value="200000" oninput="sv('adImp','adImp_r');calc()">
        </div>

        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm flex items-center gap-1">广告点击率 CTR
              <span class="tip-wrap"><span style="color:var(--muted);font-size:11px">?</span><span class="tip">看到广告的用户中点击进入落地页的比例</span></span>
            </label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="adCtr" value="2" min="0" max="100" step="0.1" oninput="calc()"><span class="text-xs" style="color:var(--muted)">%</span></div>
          </div>
          <input type="range" id="adCtr_r" min="0" max="20" step="0.1" value="2" oninput="sv('adCtr','adCtr_r');calc()">
        </div>

        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm flex items-center gap-1">落地页转化率 CVR
              <span class="tip-wrap"><span style="color:var(--muted);font-size:11px">?</span><span class="tip">点击广告进入落地页后完成首单的比例</span></span>
            </label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="adCvr" value="8" min="0" max="100" step="0.5" oninput="calc()"><span class="text-xs" style="color:var(--muted)">%</span></div>
          </div>
          <input type="range" id="adCvr_r" min="0" max="50" step="0.5" value="8" oninput="sv('adCvr','adCvr_r');calc()">
        </div>
      </div>

      <div class="rounded-2xl p-5 space-y-4" style="background:var(--surface);border:1px solid var(--border)">
        <h3 class="text-xs font-semibold uppercase tracking-widest" style="color:var(--muted)">💵 广告成本</h3>

        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="text-sm">广告总花费</label>
            <div class="flex items-center gap-1"><input type="number" class="num-in" id="adSpend" value="30000" min="0" max="10000000" step="1000" oninput="calc()"><span class="text-xs" style="color:var(--muted)">元</span></div>
          </div>
          <input type="range" id="adSpend_r" min="0" max="500000" step="1000" value="30000" oninput="sv('adSpend','adSpend_r');calc()">
        </div>

        <div class="pt-1">
          <div class="text-xs mb-2" style="color:var(--muted)">或直接覆盖计算值：</div>
          <div class="flex gap-3">
            <div class="flex-1">
              <div class="text-xs mb-1" style="color:var(--muted)">广告 CAC（元）</div>
              <input type="number" class="num-in w-full" id="adCacOverride" placeholder="自动计算" min="0" oninput="calc()" style="width:100%">
            </div>
            <div class="flex-1">
              <div class="text-xs mb-1" style="color:var(--muted)">广告 ROI</div>
              <input type="number" class="num-in w-full" id="adRoiOverride" placeholder="自动计算" min="0" step="0.01" oninput="calc()" style="width:100%">
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="space-y-4">
      <div class="rounded-2xl p-5" style="background:var(--surface);border:1px solid var(--border)">
        <h3 class="text-xs font-semibold uppercase tracking-widest mb-4" style="color:var(--muted)">广告漏斗可视化</h3>
        <div id="adsFunnel" class="space-y-0"></div>
      </div>
      <div class="grid grid-cols-2 gap-3" id="adsCards"></div>
    </div>
  </div>

  <!-- ══════════ TAB: 对比视图 ══════════ -->
  <div id="tab-compare" class="hidden fu" style="animation-delay:.08s">
    <div class="rounded-2xl p-5" style="background:var(--surface);border:1px solid var(--border)">
      <h3 class="text-xs font-semibold uppercase tracking-widest mb-5" style="color:var(--muted)">⚖️ 裂变 vs 广告投放 — 关键指标对比</h3>
      <div id="compareTable"></div>
    </div>
  </div>

  <!-- ══════════ DASHBOARD (always visible) ══════════ -->
  <div class="mt-6 space-y-5 fu" style="animation-delay:.12s">

    <!-- 4 big metric cards -->
    <div>
      <h2 class="text-xs font-semibold uppercase tracking-widest mb-3" style="color:var(--muted)">📊 Dashboard</h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="dashCards"></div>
    </div>

    <!-- Prediction bars -->
    <div class="rounded-2xl p-5" style="background:var(--surface);border:1px solid var(--border)">
      <h3 class="text-xs font-semibold uppercase tracking-widest mb-4" style="color:var(--muted)">📈 预测 — 不同分享率下的新客数</h3>
      <div id="predChart" class="flex gap-3 items-end h-40 px-2"></div>
      <div class="flex gap-3 mt-2 text-center" id="predLabels"></div>
    </div>

    <!-- 综合建议 -->
    <div class="rounded-2xl p-5" style="background:var(--surface);border:1px solid var(--border)">
      <h3 class="text-xs font-semibold uppercase tracking-widest mb-3" style="color:var(--muted)">🧠 综合建议</h3>
      <div id="advice" class="text-sm space-y-2" style="color:var(--muted); line-height:1.75"></div>
    </div>

    <!-- 关键杠杆 -->
    <div class="rounded-2xl p-5" style="background:var(--surface);border:1px solid var(--border)">
      <h3 class="text-xs font-semibold uppercase tracking-widest mb-3" style="color:var(--muted)">🔬 关键杠杆（按影响力排序）</h3>
      <div id="levers" class="space-y-3 text-sm"></div>
    </div>
  </div>

  <div class="mt-6 text-center text-xs" style="color:var(--muted)">基于线性估算模型 · 实际效果受市场/产品/时机影响 · 仅供决策参考</div>
</div>

<script>
// ── Tab switch ──
function switchTab(id, btn) {
  ['viral','ads','compare'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.remove('hidden');
  btn.classList.add('active');
}

// ── Slider sync ──
function sv(numId, rangeId) {
  const r = document.getElementById(rangeId);
  document.getElementById(numId).value = r.value;
  updateTrack(r);
}
function updateTrack(r) {
  if (!r) return;
  const p = ((+r.value - +r.min) / (+r.max - +r.min)) * 100;
  r.style.setProperty('--p', p + '%');
}
function syncR(numId, rangeId) {
  const n = document.getElementById(numId);
  const r = document.getElementById(rangeId);
  if (!r) return;
  const v = Math.min(Math.max(+n.value, +r.min), +r.max);
  r.value = v; updateTrack(r);
}

// ── Helpers ──
function fmt(n, d=0) {
  if (n===null||isNaN(n)||!isFinite(n)) return '—';
  if (Math.abs(n)>=10000) return (n/10000).toFixed(1)+'万';
  return n.toFixed(d);
}
function fmtM(n) {
  if (n===null||isNaN(n)||!isFinite(n)) return '—';
  if (Math.abs(n)>=10000) return '¥'+(n/10000).toFixed(1)+'万';
  return '¥'+n.toFixed(0);
}
function fmtRate(n) { return n===null?'—':n.toFixed(1)+'%'; }

function rateColor(r) {
  if (r>=50) return '#22c55e';
  if (r>=25) return '#4ade80';
  if (r>=10) return '#fbbf24';
  return '#f87171';
}
function badge(val, g, y, gl, yl, rl) {
  const cls = val>=g?'badge-g':val>=y?'badge-y':'badge-r';
  const lbl = val>=g?gl:val>=y?yl:rl;
  return `<span class="badge ${cls}">${lbl}</span>`;
}

// ── Funnel renderer ──
function renderFunnel(containerId, layers) {
  const el = document.getElementById(containerId);
  const maxUv = layers[0].uv;
  el.innerHTML = layers.map((l,i) => {
    const w = maxUv > 0 ? Math.max((l.uv/maxUv)*100, 8) : 8;
    const col = rateColor(l.rate ?? 100);
    const rateStr = l.rate != null ? `<span class="funnel-rate">↓${fmtRate(l.rate)}</span>` : '';
    const arrow = i > 0 ? `<div class="funnel-arrow">↓</div>` : '';
    return `${arrow}
    <div class="funnel-row">
      <div class="funnel-label">${l.label}</div>
      <div class="funnel-bar" style="width:${w}%;background:${col}22;border:1px solid ${col}44;color:${col}">
        ${l.uv >= 1000 ? fmt(l.uv) : l.uv.toFixed(0)}
      </div>
      <span class="funnel-val">${fmtM(l.uv)} UV</span>
      ${rateStr}
    </div>`;
  }).join('');
}

// ── Main calc ──
function calc() {
  // sync ranges
  ['dau','actUvRate','shareClickRate','spreadCount','helpClickRate','newUserRate','newConvRate','rewardCost','budget','gmv','margin',
   'adImp','adCtr','adCvr','adSpend'].forEach(id => syncR(id, id+'_r'));

  const dau           = +document.getElementById('dau').value;
  const actUvRate     = +document.getElementById('actUvRate').value / 100;
  const shareClickRate= +document.getElementById('shareClickRate').value / 100;
  const spreadCount   = +document.getElementById('spreadCount').value;
  const helpClickRate = +document.getElementById('helpClickRate').value / 100;
  const newUserRate   = +document.getElementById('newUserRate').value / 100;
  const newConvRate   = +document.getElementById('newConvRate').value / 100;
  const rewardCost    = +document.getElementById('rewardCost').value;
  const budget        = +document.getElementById('budget').value;
  const gmv           = +document.getElementById('gmv').value;
  const margin        = +document.getElementById('margin').value / 100;

  // Viral funnel
  const actUv       = dau * actUvRate;
  const shareUv     = actUv * shareClickRate;
  const guestUv     = shareUv * spreadCount;
  const helpUv      = guestUv * helpClickRate;
  const newHelpUv   = helpUv * newUserRate;
  const newPaid     = newHelpUv * newConvRate;
  const budgetCap   = rewardCost > 0 ? budget / rewardCost : Infinity;
  const actualNew   = Math.min(newPaid, budgetCap);

  const K           = shareClickRate * spreadCount * helpClickRate * newUserRate * newConvRate;
  const viralCac    = rewardCost > 0 ? rewardCost / (helpClickRate * newUserRate * newConvRate) : null;
  const totalReward = actualNew * rewardCost;
  const totalGmv    = actualNew * gmv;
  const totalProfit = totalGmv * margin;
  const netProfit   = totalProfit - totalReward;
  const viralRoi    = totalReward > 0 ? totalProfit / totalReward : 0;

  // Viral funnel vis
  renderFunnel('viralFunnel', [
    { label: 'App DAU',        uv: dau,      rate: null },
    { label: '活动 UV',        uv: actUv,    rate: actUvRate*100 },
    { label: '点击分享 UV',    uv: shareUv,  rate: shareClickRate*100 },
    { label: '客态页曝光 UV',  uv: guestUv,  rate: null },
    { label: '点击助力 UV',    uv: helpUv,   rate: helpClickRate*100 },
    { label: '助力新客 UV',    uv: newHelpUv,rate: newUserRate*100 },
    { label: '首单转化 UV',    uv: newPaid,  rate: newConvRate*100 },
  ]);

  // Viral metric cards
  document.getElementById('viralCards').innerHTML = `
    <div class="mcard">
      <div class="text-xs mb-1 flex items-center gap-1" style="color:var(--muted)">K 因子
        <span class="tip-wrap"><span style="font-size:10px;color:var(--muted)">?</span><span class="tip">K = 分享率×传播数×助力率×新客率×转化率。K&gt;1 自增长</span></span>
      </div>
      <div class="text-3xl font-bold" style="color:var(--green)">${K.toFixed(3)}</div>
      <div class="mt-1">${badge(K,0.5,0.2,'健康增长','边际效益','需优化')}</div>
    </div>
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">裂变 CAC</div>
      <div class="text-3xl font-bold" style="color:#4ade80">${viralCac!=null?'¥'+viralCac.toFixed(1):'—'}</div>
      <div class="text-xs mt-1" style="color:var(--muted)">每获取一名新客成本</div>
    </div>
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">预计新客数</div>
      <div class="text-3xl font-bold" style="color:var(--text)">${fmt(actualNew)}</div>
      <div class="text-xs mt-1" style="color:var(--muted)">预算上限 ${fmt(budgetCap)}</div>
    </div>
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">裂变 ROI</div>
      <div class="text-3xl font-bold" style="color:${viralRoi>=1?'#4ade80':viralRoi>=0.5?'#fbbf24':'#f87171'}">${viralRoi.toFixed(2)}x</div>
      <div class="mt-1">${badge(viralRoi,1,0.5,'首单回本','接近回本','依赖LTV')}</div>
    </div>`;

  // ── Ads ──
  const adImp  = +document.getElementById('adImp').value;
  const adCtr  = +document.getElementById('adCtr').value / 100;
  const adCvr  = +document.getElementById('adCvr').value / 100;
  const adSpend= +document.getElementById('adSpend').value;
  const adCacOv= document.getElementById('adCacOverride').value;
  const adRoiOv= document.getElementById('adRoiOverride').value;

  const adClick = adImp * adCtr;
  const adNew   = adClick * adCvr;
  const adCacCalc = adNew > 0 ? adSpend / adNew : null;
  const adCac   = adCacOv !== '' ? +adCacOv : adCacCalc;
  const adGmv   = adNew * gmv;
  const adProfit= adGmv * margin;
  const adRoiCalc = adSpend > 0 ? adProfit / adSpend : 0;
  const adRoi   = adRoiOv !== '' ? +adRoiOv : adRoiCalc;
  const adNet   = adProfit - adSpend;

  renderFunnel('adsFunnel', [
    { label: '广告曝光 UV',    uv: adImp,   rate: null },
    { label: '点击 UV (CTR)',  uv: adClick, rate: adCtr*100 },
    { label: '首单转化 (CVR)', uv: adNew,   rate: adCvr*100 },
  ]);

  document.getElementById('adsCards').innerHTML = `
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">广告新客数</div>
      <div class="text-3xl font-bold" style="color:var(--text)">${fmt(adNew)}</div>
      <div class="text-xs mt-1" style="color:var(--muted)">基于曝光×CTR×CVR</div>
    </div>
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">广告 CAC</div>
      <div class="text-3xl font-bold" style="color:#4ade80">${adCac!=null?'¥'+adCac.toFixed(1):'—'}</div>
      <div class="text-xs mt-1" style="color:var(--muted)">${adCacOv!==''?'手动覆盖':'自动计算'}</div>
    </div>
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">广告 ROI</div>
      <div class="text-3xl font-bold" style="color:${adRoi>=1?'#4ade80':adRoi>=0.5?'#fbbf24':'#f87171'}">${typeof adRoi==='number'?adRoi.toFixed(2)+'x':'—'}</div>
      <div class="mt-1">${badge(adRoi,1,0.5,'首单回本','接近回本','依赖LTV')}</div>
    </div>
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">广告净收益</div>
      <div class="text-3xl font-bold" style="color:${adNet>=0?'#4ade80':'#f87171'}">${fmtM(adNet)}</div>
      <div class="text-xs mt-1" style="color:var(--muted)">毛利 - 花费</div>
    </div>`;

  // ── Compare ──
  const rows = [
    { label:'新客数',     vir: fmt(actualNew),   ad: fmt(adNew),     better: actualNew > adNew ? 'vir' : adNew > actualNew ? 'ad' : 'eq' },
    { label:'获客成本 CAC', vir: viralCac!=null?'¥'+viralCac.toFixed(1):'—', ad: adCac!=null?'¥'+adCac.toFixed(1):'—',
      better: viralCac!=null&&adCac!=null ? (viralCac<adCac?'vir':'adCac<viralCac'?'ad':'eq') : 'eq' },
    { label:'ROI',        vir: viralRoi.toFixed(2)+'x', ad: typeof adRoi==='number'?adRoi.toFixed(2)+'x':'—',
      better: viralRoi > adRoi ? 'vir' : adRoi > viralRoi ? 'ad' : 'eq' },
    { label:'总成本',     vir: fmtM(totalReward), ad: fmtM(adSpend),  better: totalReward < adSpend ? 'vir' : adSpend < totalReward ? 'ad' : 'eq' },
    { label:'总毛利',     vir: fmtM(totalProfit), ad: fmtM(adProfit), better: totalProfit > adProfit ? 'vir' : adProfit > totalProfit ? 'ad' : 'eq' },
    { label:'净收益',     vir: fmtM(netProfit),   ad: fmtM(adNet),    better: netProfit > adNet ? 'vir' : adNet > netProfit ? 'ad' : 'eq' },
  ];

  document.getElementById('compareTable').innerHTML = `
    <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead>
        <tr style="border-bottom:1px solid var(--border)">
          <th class="text-left py-2 pr-4" style="color:var(--muted);font-weight:500;width:140px">指标</th>
          <th class="text-right py-2 px-4" style="color:var(--green)">🔁 裂变</th>
          <th class="text-right py-2 px-4" style="color:#60a5fa">📢 广告</th>
          <th class="text-right py-2 pl-4" style="color:var(--muted)">优势方</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r=>{
          const vCls = r.better==='vir'?'cmp-better':r.better==='ad'?'cmp-worse':'cmp-same';
          const aCls = r.better==='ad'?'cmp-better':r.better==='vir'?'cmp-worse':'cmp-same';
          const winLabel = r.better==='vir'?'<span class="badge badge-g">裂变</span>':r.better==='ad'?'<span class="badge" style="background:rgba(96,165,250,.12);color:#60a5fa">广告</span>':'<span class="badge badge-y">持平</span>';
          return `<tr style="border-bottom:1px solid var(--border)">
            <td class="py-3 pr-4" style="color:var(--muted)">${r.label}</td>
            <td class="text-right py-3 px-4 font-semibold ${vCls}">${r.vir}</td>
            <td class="text-right py-3 px-4 font-semibold ${aCls}">${r.ad}</td>
            <td class="text-right py-3 pl-4">${winLabel}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;

  // ── Dashboard ──
  const effRatio = viralCac!=null&&adCac!=null&&adCac>0 ? adCac/viralCac : null;
  document.getElementById('dashCards').innerHTML = `
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">裂变新客</div>
      <div class="text-4xl font-bold" style="color:var(--green)">${fmt(actualNew)}</div>
      <div class="text-xs mt-2" style="color:var(--muted)">预算内可触达</div>
    </div>
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">裂变 CAC</div>
      <div class="text-4xl font-bold" style="color:#4ade80">${viralCac!=null?'¥'+viralCac.toFixed(1):'—'}</div>
      <div class="text-xs mt-2" style="color:var(--muted)">每获取1名新客</div>
    </div>
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">裂变 ROI</div>
      <div class="text-4xl font-bold" style="color:${viralRoi>=1?'#4ade80':viralRoi>=0.5?'#fbbf24':'#f87171'}">${viralRoi.toFixed(2)}x</div>
      <div class="text-xs mt-2" style="color:var(--muted)">首单毛利/总奖励</div>
    </div>
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">vs 广告效率</div>
      <div class="text-4xl font-bold" style="color:${effRatio!=null&&effRatio>1?'#4ade80':effRatio!=null&&effRatio<1?'#f87171':'var(--muted)'}">${effRatio!=null?effRatio.toFixed(1)+'x':'填广告参数'}</div>
      <div class="text-xs mt-2" style="color:var(--muted)">${effRatio!=null?'广告CAC / 裂变CAC':'切到广告Tab填参数'}</div>
    </div>`;

  // ── Prediction bars ──
  const pRates = [5,10,15,20,25];
  const pVals = pRates.map(pr => {
    const sRate = pr/100;
    const pShareUv = actUv * sRate;
    const pGuestUv = pShareUv * spreadCount;
    const pNew = pGuestUv * helpClickRate * newUserRate * newConvRate;
    return Math.min(pNew, budgetCap);
  });
  const maxP = Math.max(...pVals, 1);
  const predChart = document.getElementById('predChart');
  const predLabels = document.getElementById('predLabels');
  predChart.innerHTML = pVals.map((v,i)=>{
    const h = Math.max((v/maxP)*100, 2);
    const isActive = Math.abs(shareClickRate*100 - pRates[i]) < 2.6;
    return `<div class="pred-bar-wrap">
      <div class="text-xs text-center font-semibold mb-1" style="color:${isActive?'var(--green)':'var(--muted)'}">${fmt(v)}</div>
      <div class="pred-bar-outer"><div class="pred-bar-fill" style="height:${h}%;opacity:${isActive?1:0.5}"></div></div>
    </div>`;
  }).join('');
  predLabels.innerHTML = pRates.map((r,i)=>`<div class="text-xs text-center flex-1" style="color:var(--muted)">${r}%分享率</div>`).join('');

  // ── Advice ──
  const advices = [];
  if (K >= 0.5) advices.push(`✅ K 因子 ${K.toFixed(3)}，裂变具备自增长能力。重点维持落地页转化和助力率不衰减。`);
  else advices.push(`⚠️ K 因子 ${K.toFixed(3)} 偏低，活动需持续投入老用户基数。建议优先提升客态页点击助力率（当前 ${(helpClickRate*100).toFixed(0)}%）和转化率。`);

  if (viralCac!=null && adCac!=null) {
    if (viralCac < adCac * 0.7) advices.push(`💡 裂变 CAC（¥${viralCac.toFixed(1)}）比广告 CAC（¥${adCac.toFixed(1)}）低 ${Math.round((1-viralCac/adCac)*100)}%，裂变渠道效率显著更优，建议优先投入。`);
    else if (viralCac > adCac) advices.push(`📊 裂变 CAC（¥${viralCac.toFixed(1)}）高于广告 CAC（¥${adCac.toFixed(1)}），需检查奖励设置或优化转化链路。`);
  }

  if (netProfit < 0) {
    const ltvX = totalReward>0 ? (totalReward/totalProfit).toFixed(1) : '—';
    advices.push(`📉 首单不回本（净收益 ${fmtM(netProfit)}），需要新客 LTV 达到首单 ${ltvX}x 才能覆盖成本。`);
  } else advices.push(`💰 首单净收益 ${fmtM(netProfit)}，活动財務健康。`);

  if (budgetCap < newPaid) advices.push(`⚡ 预算是瓶颈：自然可跑 ${fmt(newPaid)} 新客，但预算只覆盖 ${fmt(budgetCap)} 人，建议增加预算或分阶段放量。`);

  document.getElementById('advice').innerHTML = advices.map(a=>`<p>${a}</p>`).join('');

  // ── Levers ──
  const levers = [
    { name:'助力新客转化率', delta:`当前 ${(newConvRate*100).toFixed(0)}%，提升5% ≈ K+${(shareClickRate*spreadCount*helpClickRate*newUserRate*0.05).toFixed(3)}`, impact: newConvRate },
    { name:'客态页点击助力率', delta:`当前 ${(helpClickRate*100).toFixed(0)}%，直接影响漏斗到达量`, impact: helpClickRate },
    { name:'人均传播新用户数', delta:`当前 ${spreadCount}人，每+1人≈多触达 ${fmt(shareUv)} UV`, impact: spreadCount/20 },
    { name:'点击分享率', delta:`当前 ${(shareClickRate*100).toFixed(0)}%，直接决定分享入口，可优化分享激励文案`, impact: shareClickRate },
    { name:'首单 GMV', delta:`当前 ¥${gmv}，直接影响 ROI 和回本速度`, impact: gmv/1000 },
  ].sort((a,b)=>b.impact-a.impact);

  document.getElementById('levers').innerHTML = levers.map((l,i)=>`
    <div class="flex items-start gap-3">
      <span class="text-sm font-bold mt-0.5 w-4 flex-shrink-0" style="color:var(--green)">${i+1}</span>
      <div><span style="color:var(--text)">${l.name}</span><br><span class="text-xs" style="color:var(--muted)">${l.delta}</span></div>
    </div>`).join('');
}

// Init
document.querySelectorAll('input[type=range]').forEach(r => updateTrack(r));
calc();
</script>
</body>
</html>
