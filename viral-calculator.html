<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>裂变活动效果计算器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg:#0b0f1a; --surface:#131928; --border:#1e293b;
      --green:#22c55e; --green-dim:rgba(34,197,94,.1);
      --yellow:#fbbf24; --red:#f87171; --muted:#64748b; --text:#f1f5f9;
    }

    /* ── Base ── */
    *{box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC",sans-serif;overflow-x:hidden;}

    /* ── Grid background ── */
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        linear-gradient(rgba(34,197,94,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(34,197,94,.03) 1px,transparent 1px);
      background-size:40px 40px;
    }
    /* Radial glow top-right */
    body::after{
      content:'';position:fixed;top:-200px;right:-200px;width:600px;height:600px;
      background:radial-gradient(circle,rgba(34,197,94,.06) 0%,transparent 65%);
      pointer-events:none;z-index:0;
    }
    .page-wrap{position:relative;z-index:1;}

    /* ── Tabs ── */
    .tab-bar{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;}
    .tab-btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);border:none;background:transparent;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .tab-btn.active{background:var(--green-dim);color:var(--green);box-shadow:0 0 0 1px rgba(34,197,94,.25);}
    .tab-btn:hover:not(.active){color:var(--text);background:rgba(255,255,255,.03);}

    /* ── Panel cards ── */
    .panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;transition:box-shadow .3s;}
    .panel:hover{box-shadow:0 0 0 1px rgba(34,197,94,.1),0 8px 32px rgba(0,0,0,.3);}

    /* ── Inputs ── */
    .slider-wrap{position:relative;padding:10px 0 2px;}
    input[type=range]{
      -webkit-appearance:none;width:100%;height:3px;
      background:var(--border);border-radius:2px;outline:none;cursor:pointer;
      display:block;margin:0;
    }
    input[type=range]::-webkit-slider-container{overflow:visible;}
    input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;
      width:18px;height:18px;border-radius:50%;
      background:radial-gradient(circle at 40% 35%,#6ee7b7,var(--green));
      cursor:pointer;
      box-shadow:0 0 0 3px rgba(34,197,94,.15),0 0 10px rgba(34,197,94,.5);
      transition:transform .15s,box-shadow .15s;
      margin-top:-7.5px; /* (18-3)/2 = 7.5 — centers thumb on 3px track */
    }
    input[type=range]::-webkit-slider-thumb:hover{
      transform:scale(1.25);
      box-shadow:0 0 0 5px rgba(34,197,94,.2),0 0 16px rgba(34,197,94,.7);
    }
    input[type=range]::-webkit-slider-runnable-track{
      height:3px;border-radius:2px;
      background:linear-gradient(to right,var(--green) var(--p,0%),#1e293b var(--p,0%));
    }
    .num-in{
      background:rgba(15,21,35,.9);border:1px solid var(--border);
      color:var(--text);border-radius:8px;padding:5px 9px;
      width:82px;font-size:13px;font-variant-numeric:tabular-nums;
      text-align:right;outline:none;
      transition:border-color .2s,box-shadow .2s,background .2s;
    }
    .num-in:focus{
      border-color:var(--green);
      box-shadow:0 0 0 3px rgba(34,197,94,.12);
      background:rgba(20,30,50,.95);
    }
    .num-in::-webkit-inner-spin-button{opacity:.5;}

    /* ── Funnel — 3-column: label | bar | value ── */
    .funnel-row{display:grid;grid-template-columns:108px 1fr 76px;align-items:center;gap:10px;margin-bottom:4px;}
    .funnel-bar{
      height:30px;border-radius:6px;
      transition:width .5s cubic-bezier(.4,0,.2,1),background .3s;
      min-width:8px;
    }
    .funnel-label{font-size:11px;color:var(--muted);line-height:1.3;text-align:right;padding-right:4px;}
    .funnel-right{display:flex;flex-direction:column;align-items:flex-start;min-width:76px;}
    .funnel-val{font-size:12px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;line-height:1.2;}
    .funnel-rate{font-size:10px;color:var(--muted);line-height:1.2;}
    .funnel-arrow{text-align:left;padding-left:100px;font-size:10px;color:#2d3f55;margin:1px 0;}

    /* ── K-ring ── */
    .k-ring-wrap{display:flex;align-items:center;justify-content:center;position:relative;width:80px;height:80px;flex-shrink:0;}
    .k-ring-wrap svg{transform:rotate(-90deg);}
    .k-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--green);line-height:1;}
    .k-ring-sub{font-size:9px;font-weight:400;color:var(--muted);margin-top:2px;}

    /* ── Metric cards ── */
    .mcard{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .25s,transform .2s,box-shadow .25s;cursor:default;}
    .mcard:hover{border-color:rgba(34,197,94,.3);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35),0 0 0 1px rgba(34,197,94,.1);}

    /* ROI pulse when >=1 */
    @keyframes roiPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4);}50%{box-shadow:0 0 0 8px rgba(34,197,94,.0);}}
    .roi-good{animation:roiPulse 2s ease-in-out infinite;border-color:rgba(34,197,94,.3) !important;}

    /* ── Comparison table ── */
    .cmp-better{color:#4ade80;font-weight:700;}
    .cmp-worse{color:#f87171;}
    .cmp-same{color:var(--muted);}
    .cmp-row{border-bottom:1px solid var(--border);transition:background .15s;}
    .cmp-row:hover{background:rgba(34,197,94,.03);}

    /* ── Dashboard big cards ── */
    .dcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color .25s,transform .2s,box-shadow .25s;position:relative;overflow:hidden;}
    .dcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent-line,var(--border));transition:background .3s;}
    .dcard:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.4);}
    .dcard-green::before{background:linear-gradient(90deg,var(--green),#4ade80);}
    .dcard-blue::before{background:linear-gradient(90deg,#60a5fa,#93c5fd);}
    .dcard-yellow::before{background:linear-gradient(90deg,#fbbf24,#fde68a);}
    .dcard-red::before{background:linear-gradient(90deg,#f87171,#fca5a5);}

    /* Number roll animation */
    .num-roll{display:inline-block;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;}
    .num-roll.updating{transform:translateY(-8px);opacity:0;}

    /* ── Pred chart ── */
    .pred-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:0;}
    .pred-outer{width:100%;background:var(--border);border-radius:5px 5px 0 0;overflow:hidden;height:110px;display:flex;align-items:flex-end;position:relative;}
    .pred-fill{width:100%;border-radius:5px 5px 0 0;transition:height .5s cubic-bezier(.4,0,.2,1);background:linear-gradient(180deg,#4ade80,#22c55e);}
    .pred-active .pred-fill{background:linear-gradient(180deg,#86efac,#22c55e);box-shadow:0 0 12px rgba(34,197,94,.5);}
    .pred-active-line{position:absolute;top:0;left:0;right:0;bottom:0;border:1px solid rgba(34,197,94,.5);border-radius:5px 5px 0 0;pointer-events:none;}

    /* ── Badges ── */
    .badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;}
    .badge-g{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2);}
    .badge-y{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.2);}
    .badge-r{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2);}

    /* ── Section labels ── */
    .section-label{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

    /* ── Tooltip ── */
    .tip-wrap{position:relative;display:inline-flex;cursor:help;}
    .tip-wrap .tip{visibility:hidden;opacity:0;background:#1e293b;color:#94a3b8;font-size:12px;line-height:1.5;border:1px solid #334155;border-radius:8px;padding:8px 12px;position:absolute;bottom:130%;left:50%;transform:translateX(-50%);width:210px;z-index:50;transition:opacity .2s;pointer-events:none;white-space:normal;}
    .tip-wrap:hover .tip{visibility:visible;opacity:1;}

    /* ── Advice items ── */
    .advice-item{display:flex;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid var(--border);line-height:1.6;}
    .advice-item.good{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.04);}
    .advice-item.warn{border-color:rgba(251,191,36,.2);background:rgba(251,191,36,.04);}
    .advice-item.bad{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04);}
    .advice-item.info{border-color:rgba(96,165,250,.2);background:rgba(96,165,250,.04);}

    /* ── Lever rank ── */
    .lever-rank{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}

    /* ── Param row ── */
    .param-row{padding:12px 0;border-bottom:1px solid rgba(30,41,59,.6);}
    .param-row:last-child{border-bottom:none;padding-bottom:4px;}
    .param-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .param-val-box{display:flex;align-items:center;gap:4px;}
    .param-unit{font-size:12px;color:var(--muted);}

    /* ── Panel upgrade ── */
    .panel{
      background:linear-gradient(135deg,#131928 0%,#0f1520 100%);
      border:1px solid var(--border);border-radius:18px;padding:22px;
      transition:box-shadow .3s,border-color .3s;
    }
    .panel:hover{
      box-shadow:0 0 0 1px rgba(34,197,94,.12),0 12px 40px rgba(0,0,0,.35);
      border-color:rgba(34,197,94,.12);
    }

    /* ── Metric card glow on hover ── */
    .mcard{
      background:linear-gradient(135deg,#0d1220 0%,#0b0f1a 100%);
      border:1px solid var(--border);border-radius:14px;padding:16px;
      transition:border-color .25s,transform .2s,box-shadow .25s;cursor:default;
      position:relative;overflow:hidden;
    }
    .mcard::after{
      content:'';position:absolute;inset:0;border-radius:14px;
      background:radial-gradient(circle at 80% 20%,rgba(34,197,94,.04),transparent 60%);
      pointer-events:none;
    }
    .mcard:hover{border-color:rgba(34,197,94,.3);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4),0 0 0 1px rgba(34,197,94,.12);}

    /* ── Animations ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fadeUp .4s ease both;}
    @keyframes slideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
    .si{animation:slideIn .35s ease both;}

    /* ── Scrollbar ── */
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  </style>
</head>
<body class="min-h-screen">
<div class="page-wrap max-w-6xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="mb-7 fu">
    <div class="flex items-center gap-3 mb-1">
      <div style="width:36px;height:36px;border-radius:10px;background:var(--green-dim);border:1px solid rgba(34,197,94,.3);display:flex;align-items:center;justify-content:center;font-size:18px;">⚡</div>
      <h1 class="text-2xl font-bold tracking-tight">裂变活动效果计算器</h1>
      <span style="font-size:11px;padding:2px 8px;border-radius:20px;background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);font-weight:600;">funnel analyst</span>
    </div>
    <p class="text-sm ml-12" style="color:var(--muted)">App S&R 完整漏斗 · 广告投放效率对比 · 实时 Dashboard</p>
  </div>

  <!-- Tabs -->
  <div class="mb-6 fu" style="animation-delay:.04s">
    <div class="tab-bar inline-flex">
      <button class="tab-btn active" onclick="switchTab('viral',this)">🔁 裂变漏斗</button>
      <button class="tab-btn" onclick="switchTab('ads',this)">📢 广告投放</button>
      <button class="tab-btn" onclick="switchTab('compare',this)">⚖️ 对比视图</button>
    </div>
  </div>

  <!-- ══ TAB: 裂变漏斗 ══ -->
  <div id="tab-viral" class="grid md:grid-cols-2 gap-5 fu" style="animation-delay:.08s">

    <div class="space-y-4">
      <div class="panel">
        <div class="section-label mb-2">📊 漏斗参数</div>

        <!-- helper macro: each param-row -->
        <div class="param-row">
          <div class="param-header">
            <label class="text-sm flex items-center gap-1">App DAU <span class="tip-wrap"><span style="color:var(--muted);font-size:10px;background:var(--border);border-radius:4px;padding:0 5px">?</span><span class="tip">活动期间日活跃用户数</span></span></label>
            <div class="param-val-box"><input type="number" class="num-in" id="dau" value="50000" min="1000" max="10000000" step="1000" oninput="calc()"><span class="param-unit">人</span></div>
          </div>
          <div class="slider-wrap"><input type="range" id="dau_r" min="1000" max="500000" step="1000" value="50000" oninput="sv('dau','dau_r');calc()"></div>
        </div>
        <div class="param-row">
          <div class="param-header">
            <label class="text-sm flex items-center gap-1">活动 UV 率 <span class="tip-wrap"><span style="color:var(--muted);font-size:10px;background:var(--border);border-radius:4px;padding:0 5px">?</span><span class="tip">DAU 中看到活动入口的比例</span></span></label>
            <div class="param-val-box"><input type="number" class="num-in" id="actUvRate" value="30" min="0" max="100" step="1" oninput="calc()"><span class="param-unit">%</span></div>
          </div>
          <div class="slider-wrap"><input type="range" id="actUvRate_r" min="0" max="100" step="1" value="30" oninput="sv('actUvRate','actUvRate_r');calc()"></div>
        </div>
        <div class="param-row">
          <div class="param-header">
            <label class="text-sm flex items-center gap-1">点击分享 UV 率 <span class="tip-wrap"><span style="color:var(--muted);font-size:10px;background:var(--border);border-radius:4px;padding:0 5px">?</span><span class="tip">活动 UV 中点击分享按钮的比例</span></span></label>
            <div class="param-val-box"><input type="number" class="num-in" id="shareClickRate" value="10" min="0" max="100" step="0.5" oninput="calc()"><span class="param-unit">%</span></div>
          </div>
          <div class="slider-wrap"><input type="range" id="shareClickRate_r" min="0" max="100" step="0.5" value="10" oninput="sv('shareClickRate','shareClickRate_r');calc()"></div>
        </div>
        <div class="param-row">
          <div class="param-header">
            <label class="text-sm flex items-center gap-1">人均传播新用户数 <span class="tip-wrap"><span style="color:var(--muted);font-size:10px;background:var(--border);border-radius:4px;padding:0 5px">?</span><span class="tip">每位分享者平均触达几个潜在新用户</span></span></label>
            <div class="param-val-box"><input type="number" class="num-in" id="spreadCount" value="3" min="1" max="50" step="0.5" oninput="calc()"><span class="param-unit">人</span></div>
          </div>
          <div class="slider-wrap"><input type="range" id="spreadCount_r" min="1" max="20" step="0.5" value="3" oninput="sv('spreadCount','spreadCount_r');calc()"></div>
        </div>
        <div class="param-row">
          <div class="param-header">
            <label class="text-sm flex items-center gap-1">客态页点击助力率 <span class="tip-wrap"><span style="color:var(--muted);font-size:10px;background:var(--border);border-radius:4px;padding:0 5px">?</span><span class="tip">看到客态页的用户中点击助力的比例</span></span></label>
            <div class="param-val-box"><input type="number" class="num-in" id="helpClickRate" value="25" min="0" max="100" step="1" oninput="calc()"><span class="param-unit">%</span></div>
          </div>
          <div class="slider-wrap"><input type="range" id="helpClickRate_r" min="0" max="100" step="1" value="25" oninput="sv('helpClickRate','helpClickRate_r');calc()"></div>
        </div>
        <div class="param-row">
          <div class="param-header">
            <label class="text-sm flex items-center gap-1">助力新客率 <span class="tip-wrap"><span style="color:var(--muted);font-size:10px;background:var(--border);border-radius:4px;padding:0 5px">?</span><span class="tip">点击助力中属于新客（历史未购买）的比例</span></span></label>
            <div class="param-val-box"><input type="number" class="num-in" id="newUserRate" value="70" min="0" max="100" step="1" oninput="calc()"><span class="param-unit">%</span></div>
          </div>
          <div class="slider-wrap"><input type="range" id="newUserRate_r" min="0" max="100" step="1" value="70" oninput="sv('newUserRate','newUserRate_r');calc()"></div>
        </div>
        <div class="param-row">
          <div class="param-header">
            <label class="text-sm flex items-center gap-1">助力新客转化率 <span class="tip-wrap"><span style="color:var(--muted);font-size:10px;background:var(--border);border-radius:4px;padding:0 5px">?</span><span class="tip">助力新客中完成首单的比例</span></span></label>
            <div class="param-val-box"><input type="number" class="num-in" id="newConvRate" value="20" min="0" max="100" step="1" oninput="calc()"><span class="param-unit">%</span></div>
          </div>
          <div class="slider-wrap"><input type="range" id="newConvRate_r" min="0" max="100" step="1" value="20" oninput="sv('newConvRate','newConvRate_r');calc()"></div>
        </div>
      </div>
      <div class="panel">
        <div class="section-label mb-2">💵 成本 &amp; 收益</div>
        <div class="param-row">
          <div class="param-header"><label class="text-sm">每新客奖励成本</label><div class="param-val-box"><input type="number" class="num-in" id="rewardCost" value="8" min="0" max="500" step="0.5" oninput="calc()"><span class="param-unit">元</span></div></div>
          <div class="slider-wrap"><input type="range" id="rewardCost_r" min="0" max="100" step="0.5" value="8" oninput="sv('rewardCost','rewardCost_r');calc()"></div>
        </div>
        <div class="param-row">
          <div class="param-header"><label class="text-sm">活动总预算</label><div class="param-val-box"><input type="number" class="num-in" id="budget" value="50000" min="0" max="5000000" step="1000" oninput="calc()"><span class="param-unit">元</span></div></div>
          <div class="slider-wrap"><input type="range" id="budget_r" min="0" max="500000" step="1000" value="50000" oninput="sv('budget','budget_r');calc()"></div>
        </div>
        <div class="param-row">
          <div class="param-header"><label class="text-sm">首单 GMV</label><div class="param-val-box"><input type="number" class="num-in" id="gmv" value="120" min="0" max="5000" step="5" oninput="calc()"><span class="param-unit">元</span></div></div>
          <div class="slider-wrap"><input type="range" id="gmv_r" min="0" max="1000" step="5" value="120" oninput="sv('gmv','gmv_r');calc()"></div>
        </div>
        <div class="param-row">
          <div class="param-header"><label class="text-sm">毛利率</label><div class="param-val-box"><input type="number" class="num-in" id="margin" value="25" min="0" max="100" step="1" oninput="calc()"><span class="param-unit">%</span></div></div>
          <div class="slider-wrap"><input type="range" id="margin_r" min="0" max="100" step="1" value="25" oninput="sv('margin','margin_r');calc()"></div>
        </div>
      </div>
    </div>

    <div class="space-y-4">
      <div class="panel">
        <div class="section-label mb-3">漏斗可视化</div>
        <div id="viralFunnel"></div>
      </div>
      <div class="panel">
        <div class="section-label mb-3">核心指标</div>
        <div class="flex gap-4 items-start">
          <div>
            <div class="k-ring-wrap">
              <svg width="80" height="80" viewBox="0 0 80 80">
                <circle cx="40" cy="40" r="32" fill="none" stroke="#1e293b" stroke-width="6"/>
                <circle id="kRingCircle" cx="40" cy="40" r="32" fill="none" stroke="#22c55e" stroke-width="6"
                  stroke-dasharray="201" stroke-dashoffset="201" stroke-linecap="round"
                  style="transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1),stroke .3s;filter:drop-shadow(0 0 4px rgba(34,197,94,.5))"/>
              </svg>
              <div class="k-ring-text"><span id="kRingVal">—</span><span class="k-ring-sub">K因子</span></div>
            </div>
            <div id="kBadge" class="mt-2 text-center"></div>
          </div>
          <div class="grid grid-cols-2 gap-2 flex-1" id="viralCards"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ TAB: 广告投放 ══ -->
  <div id="tab-ads" class="grid md:grid-cols-2 gap-5 hidden fu" style="animation-delay:.08s">
    <div class="space-y-4">
      <div class="panel">
        <div class="section-label mb-2">📢 广告漏斗参数</div>
        <div class="param-row">
          <div class="param-header"><label class="text-sm flex items-center gap-1">广告曝光 UV <span class="tip-wrap"><span style="color:var(--muted);font-size:10px;background:var(--border);border-radius:4px;padding:0 5px">?</span><span class="tip">广告总曝光量（Impression UV）</span></span></label><div class="param-val-box"><input type="number" class="num-in" id="adImp" value="200000" min="0" max="100000000" step="10000" oninput="calc()"><span class="param-unit">UV</span></div></div>
          <div class="slider-wrap"><input type="range" id="adImp_r" min="0" max="2000000" step="10000" value="200000" oninput="sv('adImp','adImp_r');calc()"></div>
        </div>
        <div class="param-row">
          <div class="param-header"><label class="text-sm flex items-center gap-1">广告点击率 CTR <span class="tip-wrap"><span style="color:var(--muted);font-size:10px;background:var(--border);border-radius:4px;padding:0 5px">?</span><span class="tip">看到广告中点击进入落地页的比例</span></span></label><div class="param-val-box"><input type="number" class="num-in" id="adCtr" value="2" min="0" max="100" step="0.1" oninput="calc()"><span class="param-unit">%</span></div></div>
          <div class="slider-wrap"><input type="range" id="adCtr_r" min="0" max="20" step="0.1" value="2" oninput="sv('adCtr','adCtr_r');calc()"></div>
        </div>
        <div class="param-row">
          <div class="param-header"><label class="text-sm flex items-center gap-1">落地页转化率 CVR <span class="tip-wrap"><span style="color:var(--muted);font-size:10px;background:var(--border);border-radius:4px;padding:0 5px">?</span><span class="tip">点击广告后完成首单的比例</span></span></label><div class="param-val-box"><input type="number" class="num-in" id="adCvr" value="8" min="0" max="100" step="0.5" oninput="calc()"><span class="param-unit">%</span></div></div>
          <div class="slider-wrap"><input type="range" id="adCvr_r" min="0" max="50" step="0.5" value="8" oninput="sv('adCvr','adCvr_r');calc()"></div>
        </div>
      </div>
      <div class="panel">
        <div class="section-label mb-2">💵 广告成本</div>
        <div class="param-row">
          <div class="param-header"><label class="text-sm">广告总花费</label><div class="param-val-box"><input type="number" class="num-in" id="adSpend" value="30000" min="0" max="10000000" step="1000" oninput="calc()"><span class="param-unit">元</span></div></div>
          <div class="slider-wrap"><input type="range" id="adSpend_r" min="0" max="500000" step="1000" value="30000" oninput="sv('adSpend','adSpend_r');calc()"></div>
        </div>
        <div style="background:rgba(96,165,250,.05);border:1px solid rgba(96,165,250,.15);border-radius:12px;padding:14px;margin-top:4px;">
          <div class="text-xs mb-3 font-medium" style="color:#60a5fa;">覆盖计算值（可选）</div>
          <div class="flex gap-3">
            <div class="flex-1"><div class="text-xs mb-1" style="color:var(--muted)">广告 CAC（元）</div><input type="number" class="num-in" id="adCacOverride" placeholder="自动" min="0" oninput="calc()" style="width:100%"></div>
            <div class="flex-1"><div class="text-xs mb-1" style="color:var(--muted)">广告 ROI</div><input type="number" class="num-in" id="adRoiOverride" placeholder="自动" min="0" step="0.01" oninput="calc()" style="width:100%"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="space-y-4">
      <div class="panel"><div class="section-label mb-3">广告漏斗可视化</div><div id="adsFunnel"></div></div>
      <div class="panel"><div class="section-label mb-3">广告指标</div><div class="grid grid-cols-2 gap-2" id="adsCards"></div></div>
    </div>
  </div>

  <!-- ══ TAB: 对比视图 ══ -->
  <div id="tab-compare" class="hidden fu" style="animation-delay:.08s">
    <div class="panel">
      <div class="section-label mb-5">⚖️ 裂变 vs 广告投放</div>
      <div id="compareTable"></div>
    </div>
  </div>

  <!-- ══ DASHBOARD ══ -->
  <div class="mt-6 space-y-5 fu" style="animation-delay:.12s">

    <div>
      <div class="section-label mb-3">📊 Dashboard</div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="dashCards"></div>
    </div>

    <div class="panel">
      <div class="section-label mb-4">📈 预测 — 不同分享率下新客数</div>
      <div id="predChart" class="flex gap-2 items-end px-1" style="height:130px;"></div>
      <div class="flex gap-2 mt-2" id="predLabels"></div>
    </div>

    <div class="panel">
      <div class="section-label mb-4">🧠 综合建议</div>
      <div id="advice" class="space-y-2 text-sm"></div>
    </div>

    <div class="panel">
      <div class="section-label mb-4">🔬 关键杠杆（按影响力排序）</div>
      <div id="levers" class="space-y-3"></div>
    </div>
  </div>

  <div class="mt-8 text-center text-xs" style="color:rgba(100,116,139,.5)">基于线性估算模型 · 实际效果受市场/产品/时机影响 · 仅供决策参考</div>
</div>

<script>
// ── Tab ──
function switchTab(id, btn) {
  ['viral','ads','compare'].forEach(t=>document.getElementById('tab-'+t).classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.remove('hidden');
  btn.classList.add('active');
}

// ── Range track ──
function updateTrack(r){
  if(!r)return;
  const p=((+r.value-+r.min)/(+r.max-+r.min))*100;
  r.style.setProperty('--p',p+'%');
}
function sv(nId,rId){const r=document.getElementById(rId);document.getElementById(nId).value=r.value;updateTrack(r);}
function syncR(nId,rId){
  const n=document.getElementById(nId),r=document.getElementById(rId);
  if(!r)return;
  const v=Math.min(Math.max(+n.value,+r.min),+r.max);
  r.value=v;updateTrack(r);
}

// ── Fmt ──
function fmt(n,d=0){
  if(n===null||isNaN(n)||!isFinite(n))return'—';
  if(Math.abs(n)>=10000)return(n/10000).toFixed(1)+'万';
  return n.toFixed(d);
}
function fmtM(n){
  if(n===null||isNaN(n)||!isFinite(n))return'—';
  const neg=n<0;const abs=Math.abs(n);
  const s=abs>=10000?'¥'+(abs/10000).toFixed(1)+'万':'¥'+abs.toFixed(0);
  return neg?'-'+s:s;
}
function fmtR(n){return n==null?'—':n.toFixed(1)+'%';}
function rateCol(r){
  if(r>=50)return'#22c55e';if(r>=25)return'#4ade80';if(r>=10)return'#fbbf24';return'#f87171';
}
function badge(v,g,y,gl,yl,rl){
  const c=v>=g?'badge-g':v>=y?'badge-y':'badge-r';
  return`<span class="badge ${c}">${v>=g?gl:v>=y?yl:rl}</span>`;
}

// ── Funnel ──
function renderFunnel(cId,layers){
  const el=document.getElementById(cId);
  const mx=Math.max(...layers.map(l=>l.uv));
  el.innerHTML=layers.map((l,i)=>{
    const w=mx>0?Math.max((l.uv/mx)*100,5):5;
    const col=rateCol(l.rate??100);
    const rateStr=l.rate!=null
      ?`<span class="funnel-rate">↓ ${fmtR(l.rate)}</span>`:'';
    const arrow=i>0?`<div class="funnel-arrow">↓</div>`:'';
    const uvStr=l.uv>=10000?(l.uv/10000).toFixed(1)+'万':l.uv>=1000?fmt(l.uv):l.uv.toFixed(0);
    return`${arrow}<div class="funnel-row">
      <div class="funnel-label">${l.label}</div>
      <div style="min-width:0;overflow:hidden;">
        <div class="funnel-bar" style="width:${w}%;background:${col}18;border:1px solid ${col}35;box-shadow:inset 0 0 8px ${col}10"></div>
      </div>
      <div class="funnel-right">
        <span class="funnel-val" style="color:${col}">${uvStr}</span>
        ${rateStr}
      </div>
    </div>`;
  }).join('');
}

// ── Animated number counter ──
const prevVals={};
function animNum(id,val,fmtFn){
  const el=document.getElementById(id);
  if(!el)return;
  const prev=prevVals[id]??val;
  prevVals[id]=val;
  if(Math.abs(val-prev)<0.001){el.textContent=fmtFn(val);return;}
  const start=performance.now(),dur=400,from=prev,to=val;
  function step(now){
    const t=Math.min((now-start)/dur,1);
    const ease=1-Math.pow(1-t,3);
    el.textContent=fmtFn(from+(to-from)*ease);
    if(t<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── K ring ──
function updateKRing(K){
  const circle=document.getElementById('kRingCircle');
  const valEl=document.getElementById('kRingVal');
  const circ=2*Math.PI*32; // 201
  const fill=Math.min(K/1,1); // cap at 1 for full ring
  const offset=circ*(1-fill);
  circle.style.strokeDashoffset=offset;
  circle.style.stroke=K>=0.5?'#22c55e':K>=0.2?'#fbbf24':'#f87171';
  animNum('kRingVal',K,(v)=>v.toFixed(3));
  document.getElementById('kBadge').innerHTML=badge(K,0.5,0.2,'健康增长','边际效益','需优化');
}

// ── Main ──
function calc(){
  ['dau','actUvRate','shareClickRate','spreadCount','helpClickRate','newUserRate','newConvRate',
   'rewardCost','budget','gmv','margin','adImp','adCtr','adCvr','adSpend'].forEach(id=>syncR(id,id+'_r'));

  const dau          =+document.getElementById('dau').value;
  const actUvRate    =+document.getElementById('actUvRate').value/100;
  const shareClickRate=+document.getElementById('shareClickRate').value/100;
  const spreadCount  =+document.getElementById('spreadCount').value;
  const helpClickRate=+document.getElementById('helpClickRate').value/100;
  const newUserRate  =+document.getElementById('newUserRate').value/100;
  const newConvRate  =+document.getElementById('newConvRate').value/100;
  const rewardCost   =+document.getElementById('rewardCost').value;
  const budget       =+document.getElementById('budget').value;
  const gmv          =+document.getElementById('gmv').value;
  const margin       =+document.getElementById('margin').value/100;

  const actUv    =dau*actUvRate;
  const shareUv  =actUv*shareClickRate;
  const guestUv  =shareUv*spreadCount;
  const helpUv   =guestUv*helpClickRate;
  const newHelpUv=helpUv*newUserRate;
  const newPaid  =newHelpUv*newConvRate;
  const budgetCap=rewardCost>0?budget/rewardCost:Infinity;
  const actualNew=Math.min(newPaid,budgetCap);
  const K        =shareClickRate*spreadCount*helpClickRate*newUserRate*newConvRate;
  const viralCac =rewardCost>0?rewardCost/(helpClickRate*newUserRate*newConvRate):null;
  const totalRwd =actualNew*rewardCost;
  const totalGmv =actualNew*gmv;
  const totalProfit=totalGmv*margin;
  const netProfit=totalProfit-totalRwd;
  const viralRoi =totalRwd>0?totalProfit/totalRwd:0;

  renderFunnel('viralFunnel',[
    {label:'App DAU',       uv:dau,       rate:null},
    {label:'活动 UV',       uv:actUv,     rate:actUvRate*100},
    {label:'点击分享 UV',   uv:shareUv,   rate:shareClickRate*100},
    {label:'客态页曝光 UV', uv:guestUv,   rate:null},
    {label:'点击助力 UV',   uv:helpUv,    rate:helpClickRate*100},
    {label:'助力新客 UV',   uv:newHelpUv, rate:newUserRate*100},
    {label:'首单转化 UV',   uv:newPaid,   rate:newConvRate*100},
  ]);
  updateKRing(K);

  const roiClass=viralRoi>=1?' roi-good':'';
  document.getElementById('viralCards').innerHTML=`
    <div class="mcard${roiClass}">
      <div class="text-xs mb-1" style="color:var(--muted)">裂变 CAC</div>
      <div class="text-2xl font-bold" style="color:#4ade80" id="vCAC">${viralCac!=null?'¥'+viralCac.toFixed(1):'—'}</div>
      <div class="text-xs mt-1" style="color:var(--muted)">每新客成本</div>
    </div>
    <div class="mcard${roiClass}">
      <div class="text-xs mb-1" style="color:var(--muted)">裂变 ROI</div>
      <div class="text-2xl font-bold" style="color:${viralRoi>=1?'#4ade80':viralRoi>=0.5?'#fbbf24':'#f87171'}">${viralRoi.toFixed(2)}x</div>
      <div class="mt-1">${badge(viralRoi,1,0.5,'首单回本','接近回本','依赖LTV')}</div>
    </div>
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">预计新客</div>
      <div class="text-2xl font-bold" style="color:var(--text)" id="vNew">${fmt(actualNew)}</div>
      <div class="text-xs mt-1" style="color:var(--muted)">上限 ${fmt(budgetCap)}</div>
    </div>
    <div class="mcard">
      <div class="text-xs mb-1" style="color:var(--muted)">首单净收益</div>
      <div class="text-2xl font-bold" style="color:${netProfit>=0?'#4ade80':'#f87171'}">${fmtM(netProfit)}</div>
      <div class="text-xs mt-1" style="color:var(--muted)">毛利 - 奖励</div>
    </div>`;

  // Ads
  const adImp  =+document.getElementById('adImp').value;
  const adCtr  =+document.getElementById('adCtr').value/100;
  const adCvr  =+document.getElementById('adCvr').value/100;
  const adSpend=+document.getElementById('adSpend').value;
  const adCacOv=document.getElementById('adCacOverride').value;
  const adRoiOv=document.getElementById('adRoiOverride').value;
  const adClick=adImp*adCtr;
  const adNew  =adClick*adCvr;
  const adCacCalc=adNew>0?adSpend/adNew:null;
  const adCac  =adCacOv!==''?+adCacOv:adCacCalc;
  const adGmv  =adNew*gmv;
  const adProfit=adGmv*margin;
  const adRoiCalc=adSpend>0?adProfit/adSpend:0;
  const adRoi  =adRoiOv!==''?+adRoiOv:adRoiCalc;
  const adNet  =adProfit-adSpend;

  renderFunnel('adsFunnel',[
    {label:'广告曝光 UV',   uv:adImp,  rate:null},
    {label:'点击 UV (CTR)', uv:adClick,rate:adCtr*100},
    {label:'首单转化 (CVR)',uv:adNew,  rate:adCvr*100},
  ]);
  document.getElementById('adsCards').innerHTML=`
    <div class="mcard"><div class="text-xs mb-1" style="color:var(--muted)">广告新客</div><div class="text-2xl font-bold">${fmt(adNew)}</div><div class="text-xs mt-1" style="color:var(--muted)">曝光×CTR×CVR</div></div>
    <div class="mcard"><div class="text-xs mb-1" style="color:var(--muted)">广告 CAC</div><div class="text-2xl font-bold" style="color:#60a5fa">${adCac!=null?'¥'+adCac.toFixed(1):'—'}</div><div class="text-xs mt-1" style="color:var(--muted)">${adCacOv!==''?'手动覆盖':'自动计算'}</div></div>
    <div class="mcard"><div class="text-xs mb-1" style="color:var(--muted)">广告 ROI</div><div class="text-2xl font-bold" style="color:${adRoi>=1?'#4ade80':adRoi>=0.5?'#fbbf24':'#f87171'}">${typeof adRoi==='number'?adRoi.toFixed(2)+'x':'—'}</div><div class="mt-1">${badge(adRoi,1,0.5,'首单回本','接近回本','依赖LTV')}</div></div>
    <div class="mcard"><div class="text-xs mb-1" style="color:var(--muted)">广告净收益</div><div class="text-2xl font-bold" style="color:${adNet>=0?'#4ade80':'#f87171'}">${fmtM(adNet)}</div><div class="text-xs mt-1" style="color:var(--muted)">毛利 - 花费</div></div>`;

  // Compare
  const cRows=[
    {label:'新客数',      vir:fmt(actualNew),        ad:fmt(adNew),         better:actualNew>adNew?'vir':adNew>actualNew?'ad':'eq'},
    {label:'获客 CAC',   vir:viralCac!=null?'¥'+viralCac.toFixed(1):'—', ad:adCac!=null?'¥'+adCac.toFixed(1):'—',
      better:viralCac!=null&&adCac!=null?(viralCac<adCac?'vir':viralCac>adCac?'ad':'eq'):'eq'},
    {label:'ROI',         vir:viralRoi.toFixed(2)+'x',ad:typeof adRoi==='number'?adRoi.toFixed(2)+'x':'—',better:viralRoi>adRoi?'vir':adRoi>viralRoi?'ad':'eq'},
    {label:'总成本',      vir:fmtM(totalRwd),         ad:fmtM(adSpend),      better:totalRwd<adSpend?'vir':adSpend<totalRwd?'ad':'eq'},
    {label:'总毛利',      vir:fmtM(totalProfit),      ad:fmtM(adProfit),     better:totalProfit>adProfit?'vir':adProfit>totalProfit?'ad':'eq'},
    {label:'净收益',      vir:fmtM(netProfit),        ad:fmtM(adNet),        better:netProfit>adNet?'vir':adNet>netProfit?'ad':'eq'},
  ];
  document.getElementById('compareTable').innerHTML=`<div class="overflow-x-auto"><table class="w-full text-sm">
    <thead><tr style="border-bottom:1px solid var(--border)">
      <th class="text-left py-2 pr-4 font-medium" style="color:var(--muted);width:120px">指标</th>
      <th class="text-right py-2 px-4 font-semibold" style="color:var(--green)">🔁 裂变</th>
      <th class="text-right py-2 px-4 font-semibold" style="color:#60a5fa">📢 广告</th>
      <th class="text-right py-2 pl-4 font-medium" style="color:var(--muted)">优势方</th>
    </tr></thead>
    <tbody>${cRows.map(r=>{
      const vc=r.better==='vir'?'cmp-better':r.better==='ad'?'cmp-worse':'cmp-same';
      const ac=r.better==='ad'?'cmp-better':r.better==='vir'?'cmp-worse':'cmp-same';
      const wl=r.better==='vir'?'<span class="badge badge-g">裂变</span>':r.better==='ad'?'<span class="badge" style="background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.2)">广告</span>':'<span class="badge badge-y">持平</span>';
      return`<tr class="cmp-row"><td class="py-3 pr-4" style="color:var(--muted)">${r.label}</td><td class="text-right py-3 px-4 ${vc}">${r.vir}</td><td class="text-right py-3 px-4 ${ac}">${r.ad}</td><td class="text-right py-3 pl-4">${wl}</td></tr>`;
    }).join('')}</tbody>
  </table></div>`;

  // Dashboard
  const effRatio=viralCac!=null&&adCac!=null&&adCac>0?adCac/viralCac:null;
  document.getElementById('dashCards').innerHTML=`
    <div class="dcard dcard-green">
      <div class="text-xs mb-2" style="color:var(--muted)">裂变新客</div>
      <div class="text-4xl font-bold" style="color:var(--green)">${fmt(actualNew)}</div>
      <div class="text-xs mt-2" style="color:var(--muted)">预算内可触达</div>
    </div>
    <div class="dcard ${viralCac!=null&&adCac!=null&&viralCac<adCac?'dcard-green':'dcard-blue'}">
      <div class="text-xs mb-2" style="color:var(--muted)">裂变 CAC</div>
      <div class="text-4xl font-bold" style="color:#4ade80">${viralCac!=null?'¥'+viralCac.toFixed(1):'—'}</div>
      <div class="text-xs mt-2" style="color:var(--muted)">每获取1名新客</div>
    </div>
    <div class="dcard ${viralRoi>=1?'dcard-green':viralRoi>=0.5?'dcard-yellow':'dcard-red'}">
      <div class="text-xs mb-2" style="color:var(--muted)">裂变 ROI</div>
      <div class="text-4xl font-bold" style="color:${viralRoi>=1?'#4ade80':viralRoi>=0.5?'#fbbf24':'#f87171'}">${viralRoi.toFixed(2)}x</div>
      <div class="text-xs mt-2" style="color:var(--muted)">首单毛利 ÷ 总奖励</div>
    </div>
    <div class="dcard ${effRatio!=null&&effRatio>1?'dcard-green':effRatio!=null&&effRatio<1?'dcard-red':''}">
      <div class="text-xs mb-2" style="color:var(--muted)">vs 广告效率</div>
      <div class="text-4xl font-bold" style="color:${effRatio!=null&&effRatio>1?'#4ade80':effRatio!=null&&effRatio<1?'#f87171':'var(--muted)'}">${effRatio!=null?effRatio.toFixed(1)+'x':'—'}</div>
      <div class="text-xs mt-2" style="color:var(--muted)">${effRatio!=null?'广告CAC ÷ 裂变CAC':'填广告Tab参数'}</div>
    </div>`;

  // Prediction
  const pRates=[5,10,15,20,25];
  const pVals=pRates.map(pr=>{
    const sr=pr/100;
    return Math.min(actUv*sr*spreadCount*helpClickRate*newUserRate*newConvRate,budgetCap);
  });
  const maxP=Math.max(...pVals,1);
  document.getElementById('predChart').innerHTML=pVals.map((v,i)=>{
    const h=Math.max((v/maxP)*100,2);
    const active=Math.abs(shareClickRate*100-pRates[i])<2.6;
    const col=active?'var(--green)':'var(--muted)';
    return`<div class="pred-col ${active?'pred-active':''}">
      <div class="text-xs text-center font-semibold mb-1" style="color:${col};font-size:11px">${fmt(v)}</div>
      <div class="pred-outer"><div class="pred-fill" style="height:${h}%;opacity:${active?1:.45}"></div>${active?'<div class="pred-active-line"></div>':''}</div>
    </div>`;
  }).join('');
  document.getElementById('predLabels').innerHTML=pRates.map(r=>`<div class="flex-1 text-center" style="font-size:11px;color:var(--muted)">${r}%</div>`).join('');

  // Advice
  const advs=[];
  if(K>=0.5) advs.push({type:'good',text:`K 因子 <strong>${K.toFixed(3)}</strong>，裂变具备自增长能力。重点维持客态页助力率和新客转化率不衰减。`});
  else advs.push({type:'warn',text:`K 因子 <strong>${K.toFixed(3)}</strong> 偏低，活动需持续补入老用户基数驱动。优先提升客态页点击助力率（当前 ${(helpClickRate*100).toFixed(0)}%）。`});

  if(viralCac!=null&&adCac!=null){
    if(viralCac<adCac*0.7) advs.push({type:'good',text:`裂变 CAC（¥${viralCac.toFixed(1)}）比广告 CAC（¥${adCac.toFixed(1)}）低 <strong>${Math.round((1-viralCac/adCac)*100)}%</strong>，裂变渠道显著更优，建议加大预算。`});
    else if(viralCac>adCac) advs.push({type:'warn',text:`裂变 CAC（¥${viralCac.toFixed(1)}）高于广告 CAC（¥${adCac.toFixed(1)}），需检查奖励设置或优化转化链路。`});
    else advs.push({type:'info',text:`裂变 CAC 与广告 CAC 相近，可考虑混合投放，裂变为主防御基本盘。`});
  }

  if(netProfit<0){
    const lx=totalRwd>0?(totalRwd/Math.max(totalProfit,.01)).toFixed(1):'—';
    advs.push({type:'bad',text:`首单不回本（净收益 <strong>${fmtM(netProfit)}</strong>），需要新客 LTV 达到首单 <strong>${lx}x</strong> 才能覆盖成本。`});
  } else advs.push({type:'good',text:`首单净收益 <strong>${fmtM(netProfit)}</strong>，活动财务健康，首单即可回正。`});

  if(budgetCap<newPaid) advs.push({type:'info',text:`预算是瓶颈：自然可跑 <strong>${fmt(newPaid)}</strong> 新客，预算仅覆盖 <strong>${fmt(budgetCap)}</strong> 人。建议分阶段放量或增加预算。`});

  document.getElementById('advice').innerHTML=advs.map(a=>`<div class="advice-item ${a.type}"><span style="flex-shrink:0">${{good:'✅',warn:'⚠️',bad:'❌',info:'💡'}[a.type]}</span><span style="color:var(--text)">${a.text}</span></div>`).join('');

  // Levers
  const lv=[
    {name:'助力新客转化率',  sub:`当前 ${(newConvRate*100).toFixed(0)}%，每+5% K增加 ${(shareClickRate*spreadCount*helpClickRate*newUserRate*.05).toFixed(3)}`,impact:newConvRate,col:'#4ade80'},
    {name:'客态页点击助力率',sub:`当前 ${(helpClickRate*100).toFixed(0)}%，直接影响漏斗到达量`,impact:helpClickRate,col:'#22c55e'},
    {name:'人均传播新用户',  sub:`当前 ${spreadCount}人，每+1人额外触达 ${fmt(shareUv)} UV`,impact:spreadCount/20,col:'#86efac'},
    {name:'点击分享率',      sub:`当前 ${(shareClickRate*100).toFixed(0)}%，优化分享激励文案可直接拉升`,impact:shareClickRate,col:'#a7f3d0'},
    {name:'首单 GMV',        sub:`当前 ¥${gmv}，直接影响 ROI 和回本速度`,impact:gmv/1000,col:'#d1fae5'},
  ].sort((a,b)=>b.impact-a.impact);
  document.getElementById('levers').innerHTML=lv.map((l,i)=>`
    <div class="flex items-start gap-3">
      <div class="lever-rank" style="background:${l.col}18;color:${l.col};border:1px solid ${l.col}30">${i+1}</div>
      <div class="flex-1">
        <div class="text-sm font-medium" style="color:var(--text)">${l.name}</div>
        <div class="text-xs mt-0.5" style="color:var(--muted)">${l.sub}</div>
      </div>
      <div style="width:80px;height:4px;background:var(--border);border-radius:2px;margin-top:8px;flex-shrink:0;">
        <div style="height:100%;width:${Math.min(l.impact*100,100)}%;background:${l.col};border-radius:2px;transition:width .4s"></div>
      </div>
    </div>`).join('');
}

// Init
document.querySelectorAll('input[type=range]').forEach(r=>updateTrack(r));
calc();
</script>
</body>
</html>
